llm:
  provider: openai
  model: gpt-4o              # fallback — used if stage-specific key absent
  translate_model: gpt-4o    # Call A: faithful translation — keep full model
  structure_model: gpt-4o       # Call B: reverted — mini failed vague-placement eval (1/4 cases)

transcription:
  provider: gemini
  model: gemini-2.5-flash   # switched from gpt-4o-transcribe — Gemini handles Telugu
                             # regional dialects (Telangana/Andhra/Rayalaseema/Hyderabadi)
                             # far better; dialect context expressed in the prompt directly

supabase:
  table: recipes
