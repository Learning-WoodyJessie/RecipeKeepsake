<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecipeKeepsake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A18;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #A78BFA;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748B;
      margin-bottom: 2.5rem;
    }

    /* ── Record button ── */
    .record-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    #record-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: none;
      background: #A78BFA;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 0 0 0 rgba(167,139,250,0.5);
    }

    #record-btn:hover { transform: scale(1.05); }

    #record-btn.recording {
      background: #EF4444;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
      70%  { box-shadow: 0 0 0 18px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    #timer {
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      color: #94A3B8;
      min-height: 1.5rem;
    }

    #status {
      font-size: 0.85rem;
      color: #818CF8;
      min-height: 1.2rem;
      text-align: center;
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 36px;
      height: 36px;
      border: 3px solid #1E1B4B;
      border-top-color: #A78BFA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Recipe card ── */
    #recipe-card {
      display: none;
      background: #0F0F23;
      border: 1px solid #1E1B4B;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dish-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #A78BFA;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #1E1B4B;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #818CF8;
      margin-bottom: 0.5rem;
    }

    .section { margin-bottom: 1.25rem; }

    .ingredient-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .ingredient-list li {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #1a1a2e;
    }

    .ingredient-list li .qty {
      color: #94A3B8;
      font-size: 0.85rem;
    }

    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .steps-list li {
      display: flex;
      gap: 0.75rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #1E1B4B;
      color: #818CF8;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .cook-notes {
      background: #1a1a2e;
      border-left: 3px solid #A78BFA;
      border-radius: 0 8px 8px 0;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      color: #CBD5E1;
      line-height: 1.6;
      font-style: italic;
    }

    .flags {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .flag {
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      color: #FCA5A5;
    }

    .transcript-toggle {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid #1E1B4B;
    }

    .transcript-toggle summary {
      font-size: 0.78rem;
      color: #64748B;
      cursor: pointer;
      user-select: none;
    }

    .transcript-text {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: #475569;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    #error-box {
      display: none;
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 1rem;
      color: #FCA5A5;
      font-size: 0.88rem;
      width: 100%;
      max-width: 520px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <h1>🫙 RecipeKeepsake</h1>
  <p class="subtitle">Record grandma. Capture the recipe.</p>

  <div class="record-wrap">
    <button id="record-btn" title="Tap to record">🎙️</button>
    <div id="timer"></div>
    <div id="status">Tap to start recording</div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div id="error-box"></div>

  <div id="recipe-card">
    <div class="dish-name" id="dish-name"></div>

    <div class="section" id="ingredients-section">
      <div class="section-label">Ingredients</div>
      <ul class="ingredient-list" id="ingredients-list"></ul>
    </div>

    <div class="section" id="steps-section">
      <div class="section-label">Steps</div>
      <ol class="steps-list" id="steps-list"></ol>
    </div>

    <div class="section" id="notes-section" style="display:none">
      <div class="section-label">Grandma's notes</div>
      <div class="cook-notes" id="cook-notes"></div>
    </div>

    <div class="section" id="flags-section" style="display:none">
      <div class="section-label">⚠️ Review flags</div>
      <div class="flags" id="flags-list"></div>
    </div>

    <details class="transcript-toggle">
      <summary>Show raw transcript</summary>
      <div class="transcript-text" id="transcript-raw"></div>
      <div class="transcript-text" id="transcript-english" style="margin-top:0.5rem; color:#334155;"></div>
    </details>
  </div>

  <script>
    const btn     = document.getElementById('record-btn');
    const timer   = document.getElementById('timer');
    const status  = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const card    = document.getElementById('recipe-card');
    const errBox  = document.getElementById('error-box');

    let mediaRecorder, chunks = [], timerInterval, seconds = 0;

    function formatTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    btn.addEventListener('click', async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        // ── STOP ──
        mediaRecorder.stop();
      } else {
        // ── START ──
        errBox.style.display = 'none';
        card.style.display = 'none';
        chunks = [];
        seconds = 0;
        timer.textContent = '00:00';

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = handleStop;
          mediaRecorder.start();

          btn.classList.add('recording');
          btn.textContent = '⏹️';
          status.textContent = 'Recording… tap to stop';

          timerInterval = setInterval(() => {
            seconds++;
            timer.textContent = formatTime(seconds);
            if (seconds >= 600) mediaRecorder.stop(); // 10 min cap
          }, 1000);
        } catch (err) {
          showError('Microphone access denied: ' + err.message);
        }
      }
    });

    async function handleStop() {
      clearInterval(timerInterval);
      btn.classList.remove('recording');
      btn.textContent = '🎙️';
      status.textContent = 'Processing…';
      spinner.style.display = 'block';
      timer.textContent = '';

      const blob = new Blob(chunks, { type: 'audio/webm' });
      const form = new FormData();
      form.append('audio', blob, 'recording.webm');

      try {
        const res = await fetch('/capture', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Something went wrong.');
          return;
        }
        renderCard(data);
      } catch (err) {
        showError('Could not reach server: ' + err.message);
      } finally {
        spinner.style.display = 'none';
        status.textContent = 'Tap to record again';
      }
    }

    function renderCard(r) {
      // Dish name
      document.getElementById('dish-name').textContent =
        r.dish_name || '(dish name not detected)';

      // Ingredients
      const ingList = document.getElementById('ingredients-list');
      ingList.innerHTML = '';
      (r.ingredients || []).forEach(ing => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${ing.item}</span><span class="qty">${ing.quantity || ''}</span>`;
        ingList.appendChild(li);
      });

      // Steps
      const stepList = document.getElementById('steps-list');
      stepList.innerHTML = '';
      (r.steps || []).forEach((step, i) => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="step-num">${i + 1}</span><span>${step}</span>`;
        stepList.appendChild(li);
      });

      // Cook notes
      const notesSection = document.getElementById('notes-section');
      if (r.cook_notes) {
        document.getElementById('cook-notes').textContent = r.cook_notes;
        notesSection.style.display = 'block';
      } else {
        notesSection.style.display = 'none';
      }

      // Review flags
      const flagsSection = document.getElementById('flags-section');
      const flagsList = document.getElementById('flags-list');
      flagsList.innerHTML = '';
      if (r.review_flags && r.review_flags.length > 0) {
        r.review_flags.forEach(f => {
          const div = document.createElement('div');
          div.className = 'flag';
          div.textContent = f;
          flagsList.appendChild(div);
        });
        flagsSection.style.display = 'block';
      } else {
        flagsSection.style.display = 'none';
      }

      // Transcripts
      document.getElementById('transcript-raw').textContent =
        'Telugu: ' + (r.transcript_raw || '');
      document.getElementById('transcript-english').textContent =
        'English: ' + (r.transcript_english || '');

      card.style.display = 'block';
      card.scrollIntoView({ behavior: 'smooth' });
    }

    function showError(msg) {
      errBox.textContent = '❌ ' + msg;
      errBox.style.display = 'block';
      spinner.style.display = 'none';
      status.textContent = 'Tap to try again';
    }
  </script>
</body>
</html>
