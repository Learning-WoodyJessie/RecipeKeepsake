# Force Nixpacks to use Python provider.
# Without this, Railway picks Node.js because package.json (Capacitor mobile
# tooling) is detected before requirements.txt, producing a container with no
# Python runtime and a failing "python: command not found" start command.
providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc", "libffi", "openssl", "nodejs_20", "nodePackages.npm", "ffmpeg"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --no-cache-dir -r requirements.txt",
  "cd frontend && npm ci --prefer-offline"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "/opt/venv/bin/python -m scripts.serve"
